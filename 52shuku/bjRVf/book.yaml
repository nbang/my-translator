  description: "Đầu bếp năm sao Bồ Nhuế ràng buộc một hệ thống kinh doanh cùng một quán ăn khuya bắc ngang qua Khê Xuyên Giới và dị giới. Mỗi tối chín giờ quán mở cửa, món ăn không chỉ ngon mê mẩn mà còn mang dị năng, khiến quán nhanh chóng nổi đình đám ở cả hai giới. Hệ thống còn ràng buộc thêm Lê Mộ Trản làm ông chủ hợp tác, cùng cô kinh doanh và nằm không hốt bạc."
