# Fixed Chinese -> Hán Việt terms for QA/consistency enforcement.
terms:
- chinese: "桑野"
  hanviet: "Tang Dã"
  role: "nữ chính"
  note: "Xuyên không từ nữ tu bản thể cây ngô đồng thành Hướng đạo cấp B"
- chinese: "林长离"
  hanviet: "Lâm Trường Ly"
  role: "nam chính"
  note: "Con trai hoàng đế, nguyên là Nguyên soái, bị lưu đày vì tinh thần bạo loạn"
- chinese: "苏墨"
  hanviet: "Tô Mặc"
  role: "nhân vật phụ"
  note: "Cấp trên trực tiếp của nguyên chủ"
- chinese: "十方坞"
  hanviet: "Thập Phương Ổ"
  role: "danh từ riêng"
  note: "Môn phái tu chân của Tang Dã, giỏi trồng trọt và nấu ăn"
- chinese: "黑塔星"
  hanviet: "Hắc Tháp Tinh"
  role: "danh từ riêng"
  note: "Hành tinh phế thổ nơi lưu đày các Sentinel bạo loạn; còn gọi 黑塔行星"
- chinese: "伽玛帝国"
  hanviet: "Đế Quốc Gamma"
  role: "danh từ riêng"
  note: "Đế quốc trong thế giới tinh tế"
- chinese: "向导"
  hanviet: "Hướng đạo"
  role: "thuật ngữ"
  note: "Người điều hòa tinh thần cho Sentinel"
- chinese: "哨兵"
  hanviet: "Sentinel"
  role: "thuật ngữ"
  note: "Tiêu binh; chiến binh có tinh thần lực mạnh cần Hướng đạo điều hòa"
- chinese: "洞天"
  hanviet: "Động Thiên"
  role: "thuật ngữ"
  note: "Không gian tinh thần của Tang Dã, thay thế tinh thần đồ cảnh"
- chinese: "储物戒"
  hanviet: "Nhẫn Trữ Vật"
  role: "thuật ngữ"
  note: "Bảo vật sư môn chứa đầy nguyên liệu và hạt giống"
