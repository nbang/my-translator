  description: "Tang Dã xuyên không, từ một nữ tu bản thể cây ngô đồng ở tu chân giới biến thành một Hướng đạo cấp B của thế giới tinh tế, ngày mai sẽ bị xử tử vì tội ngược đãi Sentinel. May thay động thiên và nhẫn trữ vật chứa đầy linh thực linh thú cùng tài nấu nướng thượng thừa từ sư môn cũng theo cô xuyên đến. Nhờ những món ăn tràn đầy tinh thần lực, cô đổi án tử hình thành lưu đày đến Hắc Tháp Tinh, hành tinh phế thổ tụ tập vô số Sentinel tinh thần bạo loạn không ai chữa nổi. Từ vạch xuất phát là nhà tù, cô từng bước dùng ẩm thực tạo nên kỳ tích và thậm chí trồng được lương thực trên hành tinh hoang tàn."
