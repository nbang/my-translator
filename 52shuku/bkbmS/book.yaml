  description: "Ông lão họ Nam trông coi một quán trà cũ trong hẻm Mạo Nhi giữa lòng phố thị, ngày nào cũng như ngày nấy với ấm đồng, chén trà và hương trà thoang thoảng. Một ngày, cô cháu gái Nam Cửu bị cha bỏ mặc tìm về nương náu, gặp gỡ Tống Đình - người con nuôi trầm lặng của ông lão. Câu chuyện tình cảm hiện đại ấm áp về sự cứu chuộc, chữa lành và trưởng thành nơi con hẻm nhỏ."
