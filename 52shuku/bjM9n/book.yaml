  description: "Sau khi bà nội qua đời, Niên Tuế thừa kế một tiệm ăn sáng cũ, một cuốn sổ ghi khoản nợ cả triệu, cùng một hệ thống tự xưng đến từ thế giới cao chiều. Ràng buộc hệ thống, cô bước vào không gian Sơn Hải với núi non, rừng rậm, thảo nguyên chưa hề bị ô nhiễm, hoàn thành nhiệm vụ để có được nguyên liệu tươi ngon nhất, biến tiệm ăn sáng nhỏ thành nhà hàng vườn hai tầng và từ nợ nần chuyển sang thu nhập tiền triệu mỗi ngày."
