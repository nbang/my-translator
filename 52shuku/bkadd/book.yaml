  description: "Thẩm Thiển, nhân viên xuất sắc của Cục Xuyên Nhanh Thời Không, nhận nhiệm vụ xuyên vào sách - cứ tưởng sẽ làm phản diện pháo hôi lật ngược thế cờ, ai ngờ hệ thống báo nhiệm vụ thật là làm MẸ của nhân vật pháo hôi. Cô phải nuôi lớn đứa con trai Phó Viễn Bạc - kẻ bị nhà hào môn tìm về làm 'con thế mạng', đổi vận cho thiếu gia giả - và xoay chuyển số phận bi thảm của cậu bé qua từng thế giới khác nhau."
