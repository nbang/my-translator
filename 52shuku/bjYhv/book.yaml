  description: "Ở thời đại tinh tế, do môi trường ô nhiễm mà thực vật hoang dã hầu hết đều là giống đột biến kỳ dị và ăn thịt, không quang hợp nên không sinh ra oxy, khiến cư dân các vì sao đều mắc chứng thiếu oxy. Lâm Uy xuyên không đến đây, mang theo năng lực thân hòa thực vật cùng 'đôi mắt nhìn thấu cây xanh', lại nhập hồn vào thân xác một tiểu hot girl hạng bét chuyên phát trực tiếp mấy trò kỳ quái, nghèo đến mức chỉ muốn xuyên thêm lần nữa. Tình cờ thấy một chậu lan hồ điệp bình thường được đấu giá với giá trên trời, cô hậu tri hậu giác nhận ra: mình sắp phát tài rồi!"
