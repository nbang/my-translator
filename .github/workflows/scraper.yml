name: Scrape Chapters

on:
  workflow_dispatch:
    inputs:
      book_base_dir:
        description: 'Book id (e.g. biqu59096 or 52shuku/bjXRF)'
        required: true
        default: 'biqu59096'
        type: string
      source_url:
        description: 'Chapter-list (TOC) URL'
        required: true
        default: 'https://www.52shuku.net'
        type: string
      limit:
        description: 'Max chapters (blank = all)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run scraper
        run: |
          python -m translator.workflow.pipeline \
            --book "${{ inputs.book_base_dir }}" \
            --stage scrape \
            --source-url "${{ inputs.source_url }}" \
            ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }}
      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scraped chapters" && git push)
