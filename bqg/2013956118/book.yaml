  description: "Giang Thu Thu, một blogger ẩm thực nổi tiếng của thế kỷ 21, gặp tai nạn rồi xuyên vào thời đại tinh tế, mang theo thân phận một cô nhi nghèo rớt sắp phá sản. Để kiếm sống và tránh bị đày đi đào mỏ vì nợ phí, cô nối lại nghề cũ, mở kênh phát sóng trực tiếp về ẩm thực trên Tinh Võng. Nhờ tài nấu nướng, cô dần chinh phục cả liên bang, thu hút vô số người hâm mộ quyền thế - đứng đầu bảng là Thượng tướng Mặc Tư, 'lưỡi đao của đế quốc'."
